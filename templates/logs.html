{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <h1>Logs & Export</h1>
  <p>
    Structured traffic decision logs generated by the control platform. These logs can be reviewed and exported.
  </p>
</section>

<section class="content-card">
  <div class="top-actions">
    <a href="/api/export_logs" class="primary-btn link-btn">Download CSV Logs</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Service</th>
          <th>Traffic Type</th>
          <th>Requests</th>
          <th>Allowed</th>
          <th>Blocked</th>
          <th>Health</th>
          <th>Decision</th>
        </tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>
  </div>
</section>
{% endblock %}
